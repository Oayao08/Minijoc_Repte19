<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecta’t amb la Via - Seguretat en Patinet Elèctric</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style-joc.css">
</head>
<body>

  <!-- Capçalera amb logos institucionals -->
  <header class="gh">
    <img src="../logos/Logo-RACC_JiM.jpeg" alt="RACC" class="logo">
    <div class="gh-title">
      <span class="gh-top">Joc educatiu de seguretat vial</span>
      <span class="gh-main">Connecta’t amb la Via</span>
    </div>
    <img src="../logos/sctlogo.jpg" alt="SCT" class="logo">
  </header>

  <!-- Joc principal -->
  <main>
    <div id="wrap">
      <canvas id="c" width="480" height="680"></canvas>
    </div>
    <p id="hint">
      ← → CARRIL &nbsp;·&nbsp; ↑ ACCELERA &nbsp;·&nbsp; ↓ FRENA &nbsp;·&nbsp;
      <span class="hk">C</span> CANCEL·LA &nbsp;·&nbsp;
      <span class="hk">V</span> ACCEPTA &nbsp;·&nbsp;
      <span class="hk">ENTER</span> CONTINUAR
    </p>
  </main>

  <!-- Peu de pàgina -->
  <footer class="gf">
    <img src="../logos/idbh.jpg" alt="IDBH" class="logo-sm">
    <span class="gf-text">Projecte d'educació vial · Seguretat en patinet elèctric</span>
    <img src="../logos/Logo-RACC_JiM.jpeg" alt="RACC" class="logo-sm">
  </footer>

  <!-- Motor del joc -->
  <script src="../js/game.js"></script>

</body>
</html>
